<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${client.id == null ? 'Nouveau Client - Pizzeria Firenze' : 'Modifier Client - Pizzeria Firenze'}"></title>

    <link rel="stylesheet" th:href="@{/style/styles.css}">
</head>
<body>

<header>
    <div class="header-title">Pizzeria Firenze</div>
    <div class="nav-buttons">
        <a th:href="@{/clients}" class="nav-btn">Clients</a>
        <a href="#" class="nav-btn">Déconnecter</a>
    </div>
</header>

<div class="main">
    <div class="menu">
        <h2 th:text="${client.id == null ? 'Ajouter un nouveau client' : 'Modifier le client'}">Formulaire</h2>

        <div class="form-container">
            <form th:action="${client.id == null ? '/clients/nouveau' : '/clients/modifier/' + client.id}"
                  th:object="${client}"
                  method="post">

                <input type="hidden" th:field="*{id}" />

                <div class="form-group">
                    <label for="firstName">Prénom</label>
                    <input type="text" id="firstName" th:field="*{firstName}"
                           th:classappend="${#fields.hasErrors('firstName')} ? 'input-error' : ''"
                           placeholder="Ex: Mario" />

                    <div th:if="${#fields.hasErrors('firstName')}" th:errors="*{firstName}" class="error-text">
                        Erreur prénom
                    </div>
                </div>

                <div class="form-group">
                    <label for="lastName">Nom</label>
                    <input type="text" id="lastName" th:field="*{lastName}"
                           th:classappend="${#fields.hasErrors('lastName')} ? 'input-error' : ''"
                           placeholder="Ex: Rossi" />

                    <div th:if="${#fields.hasErrors('lastName')}" th:errors="*{lastName}" class="error-text">
                        Erreur nom
                    </div>
                </div>

                <div class="form-actions">
                    <a th:href="@{/clients}" class="btn-cancel">Annuler</a>
                    <button type="submit" class="btn-submit">Sauvegarder</button>
                </div>
            </form>
        </div>
    </div>
</div>

<footer class="footer">
    © Pizzeria Firenze 2026
</footer>

<script th:src="@{/script/main.js}"></script>
</body>
</html>
