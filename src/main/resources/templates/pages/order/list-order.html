<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Liste des commandes - Pizzeria Firenze</title>
    <link rel="stylesheet" href="/style/styles.css">
</head>

<body>

<!-- HEADER -->
<div id="header"></div>

<!-- MAIN -->
<div class="main">
    <div class="menu">
        <h2>Liste des Commandes</h2>

        <table class="order-table">
            <thead>
            <tr>
                <th>ID</th>
                <th>Date</th>
                <th>Client</th>
                <th>Status</th>
                <th>Actions</th>
            </tr>
            </thead>

            <tbody id="orders-table">
            <!-- Example rows -->
            <tr>
                <td>1</td>
                <td>2026-04-01 12:15</td>
                <td>Marco Rossi</td>
                <td>En cours</td>
                <td>
                    <button class="btn-edit" onclick="editOrder(1)">Modifier</button>
                    <button class="btn-red" onclick="deleteOrder(1)">Supprimer</button>
                </td>
            </tr>

            <tr>
                <td>2</td>
                <td>2026-04-01 12:45</td>
                <td>Giulia Bianchi</td>
                <td>Terminée</td>
                <td>
                    <button class="btn-edit" onclick="editOrder(1)">Modifier</button>
                    <button class="btn-red" onclick="deleteOrder(1)">Supprimer</button>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<!-- FOOTER -->
<div id="footer"></div>

<!-- JS -->
<script src="/script/main.js"></script>

<script>
    fetch("/components/header.html")
        .then(res => res.text())
        .then(data => document.getElementById("header").innerHTML = data);

    fetch("/components/footer.html")
        .then(res => res.text())
        .then(data => document.getElementById("footer").innerHTML = data);


</script>
<div id="confirmModal" class="modal">
    <div class="modal-content">
        <p id="confirmMessage"></p>

        <div class="modal-buttons">
            <button id="confirmYes" class="btn-blue">Oui</button>
            <button onclick="closeModal()" class="btn-red">Annuler</button>
        </div>
    </div>
</div>
</body>
</html>
