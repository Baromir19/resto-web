<!DOCTYPE html>
<html lang="fr">

<head th:replace="~{components/heads :: listHead('Plats')}"></head>

<body>
<header th:replace="~{components/headers :: mainHeader}"></header>
<!-- MAIN -->
<main class="main">
    <div class="menu">
        <h1 class="title">Plats</h1>
        <section class="categories-bar">
            <!-- LEFT: category buttons -->
            <div class="categories">
                <button class="btn" id="btnPizzaFilter" >Pizzas</button>
                <button class="btn" id="btnDrinkFilter">Boissons</button>
                <button class="btn" id="btnDessertFilter">Desserts</button>
            </div>
            <!-- RIGHT: create button -->
            <a class="btn create" th:href="@{/dishes/new}">
                + Nouveau
            </a>
        </section>
        <section class="grid grid-dish">
            <div class="card"
                 th:each="dish : ${dishes}"
                 th:classappend="${dish.category.toLowerCase()}">
                <b th:text="${dish.name}">TITLE</b><br>
                <p th:text="${dish.description}">DESCRIPTION</p>
                <p class="price" th:text="${dish.price} + ' €'">PRICE</p>
                <div class="card-actions">

                    <a class="btn edit"
                       th:href="@{/dishes/{id}/edit(id=${dish.id})}">
                        Modifier
                    </a>

                    <form th:action="@{/dishes/delete/{id}(id=${dish.id})}"
                          method="post"
                          style="display:inline;">
                        <button class="btn delete"
                                onclick="return confirm('Êtes-vous sûr de vouloir supprimer cet article ?');">
                            Supprimer
                        </button>
                    </form>

                </div>
            </div>
        </section>
    </div>
</main>

<footer th:replace="~{components/footers :: mainFooter}"></footer>

<script th:src="@{/script/main.js}"></script>
<script th:src="@{/script/dish-tools.js}"></script>
</body>
</html>
